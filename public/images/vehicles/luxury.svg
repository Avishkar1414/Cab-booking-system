<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lx-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="lx-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="lx-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8EAF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8EAF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lx-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lx-wheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B4257"/>
      <stop offset="100%" stop-color="#0F1326"/>
    </linearGradient>
    <linearGradient id="lx-chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#E8EAF6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <circle cx="200" cy="106" r="106" fill="url(#lx-glow)"/>
  <ellipse cx="202" cy="178" rx="152" ry="14" fill="url(#lx-shadow)"/>

  <!-- long sleek body -->
  <path d="M18 138 C18 112 32 100 50 96 L92 82 L122 54 C132 44 148 38 166 38 L228 38 C244 38 258 44 266 54 L292 82 L338 96 C366 100 392 110 396 126 C400 138 396 148 382 150 L370 150 C370 132 356 118 338 118 C320 118 306 132 306 150 L114 150 C114 132 100 118 82 118 C64 118 50 132 50 150 L30 150 C22 150 18 144 18 138 Z"
    fill="url(#lx-body)"/>

  <!-- low sleek windows -->
  <path d="M120 78 L140 58 C148 50 158 44 172 44 L198 44 L198 78 Z" fill="url(#lx-glass)" opacity="0.9"/>
  <path d="M204 44 L224 44 C236 44 246 50 252 58 L272 78 L204 78 Z" fill="url(#lx-glass)" opacity="0.9"/>
  <path d="M201 44 L201 78" stroke="#0A0F24" stroke-width="2" opacity="0.45"/>

  <!-- chrome side accent -->
  <path d="M40 102 L386 102" stroke="url(#lx-chrome)" stroke-width="2.5" opacity="0.85"/>

  <!-- lights -->
  <ellipse cx="386" cy="112" rx="11" ry="6" fill="#FDE68A" opacity="0.95"/>
  <ellipse cx="28" cy="112" rx="8" ry="6" fill="#60A5FA" opacity="0.85"/>

  <!-- emblem -->
  <circle cx="201" cy="60" r="4.5" fill="#FDE68A" opacity="0.9"/>

  <!-- wheels with premium rims -->
  <circle cx="82" cy="150" r="28" fill="url(#lx-wheel)"/>
  <circle cx="82" cy="150" r="12" fill="#1C2438" stroke="#FDE68A" stroke-width="2.2"/>
  <circle cx="338" cy="150" r="28" fill="url(#lx-wheel)"/>
  <circle cx="338" cy="150" r="12" fill="#1C2438" stroke="#FDE68A" stroke-width="2.2"/>
</svg>
